name: Wait for Copilot review
on:
  pull_request: { types: [opened, synchronize, reopened] }
  pull_request_review: { types: [submitted] }
jobs:
  wait:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - run: |
          for i in $(seq 1 60); do
            got=$(gh api "repos/${{github.repository}}/pulls/${{github.event.pull_request.number}}/reviews" \
              --jq '[.[] | select(.user.login=="copilot-pull-request-reviewer[bot]") | select(.submitted_at > "${{github.event.pull_request.updated_at}}")] | length')
            [ "$got" -gt 0 ] && exit 0
            sleep 10
          done
          echo "Copilot didn't review within 10 min" >&2; exit 1
        env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
